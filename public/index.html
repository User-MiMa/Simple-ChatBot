<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Ask-A-Bot</title>
</head>
<body>
    <div class="chatContainer">
        <h1>Ask-A-Bot</h1>
        <textarea 
        id="promptSpace" 
        placeholder="I am Ask-A-Bot: Ask me anything like 'Why the sky is blue? My dog can talk? or whatever you want!"
        ></textarea>
        <button
        type="submit">
        Answer me!
        </button>
    </div>
</body>
</html>
